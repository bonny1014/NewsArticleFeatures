<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anatomy of a News Article</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#FAF9F6;min-height:100vh}
button{font-family:inherit;cursor:pointer}

.top-bar{background:#1a1a1a;color:#fff;padding:20px 24px;text-align:center;border-bottom:4px solid #1565C0}
.top-bar h1{font-size:clamp(20px,4vw,30px);font-weight:800;margin-bottom:4px}
.top-bar p{font-size:12px;color:#aaa;letter-spacing:2px;text-transform:uppercase}

.mode-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:12px 20px;background:#fff;border-bottom:2px solid #eee;position:sticky;top:0;z-index:50}
.mode-btn{padding:10px 20px;border-radius:10px;font-weight:700;font-size:13px;border:2px solid #ddd;background:#fff;color:#555;transition:all .2s}
.mode-btn.active{border-color:#1565C0;background:#1565C0;color:#fff}
.mode-btn.s-active{border-color:#2E7D32;background:#2E7D32;color:#fff}

.container{max-width:850px;margin:0 auto;padding:20px 20px 60px}
.ins{border-radius:12px;padding:16px 20px;margin-bottom:16px;font-size:14px;line-height:1.6}
.ins.t{border:2px solid #90CAF9;background:#E3F2FD;color:#1565C0}
.ins.s{border:2px solid #A5D6A7;background:#E8F5E9;color:#2E7D32}

.wb{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:14px 16px;margin-bottom:16px;position:sticky;top:56px;z-index:40}
.wb-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.wb-items{display:flex;flex-wrap:wrap;gap:6px}
.wb-pill{padding:5px 12px;border-radius:20px;font-weight:700;font-size:12px;color:#fff;letter-spacing:.3px;display:inline-block}
.wb-pill.used{opacity:.25;text-decoration:line-through}

.article{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.08);border:2px solid #e0e0e0}
.article-inner{padding:28px 24px;font-family:Georgia,serif;font-size:16px;line-height:1.9;color:#333;user-select:text}
.a-headline{font-size:clamp(22px,4.5vw,32px);font-weight:700;line-height:1.25;color:#1a1a1a;margin-bottom:14px;font-family:Georgia,serif}
.a-byline{font-size:14px;color:#555;margin-bottom:16px;font-family:'Poppins',sans-serif}
.a-byline strong{color:#222}
.a-para{margin-bottom:14px}

mark{border-radius:3px;padding:1px 2px;position:relative}
mark .ml{position:absolute;top:-17px;left:0;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:1px 7px;border-radius:10px;color:#fff;white-space:nowrap;font-family:'Poppins',sans-serif;pointer-events:none;line-height:1.3}
.hl-headline{background:#FFCDD2}.hl-headline .ml{background:#D32F2F}
.hl-byline{background:#E1BEE7}.hl-byline .ml{background:#7B1FA2}
.hl-lead{background:#BBDEFB}.hl-lead .ml{background:#1565C0}
.hl-detail1{background:#C8E6C9}.hl-detail1 .ml{background:#2E7D32}
.hl-detail2{background:#C8E6C9}.hl-detail2 .ml{background:#388E3C}
.hl-detail3{background:#C8E6C9}.hl-detail3 .ml{background:#43A047}
.hl-quotation{background:#FFF9C4}.hl-quotation .ml{background:#F57F17}
.hl-tail{background:#FFE0B2}.hl-tail .ml{background:#E65100}
.hl-who{background:#FFCDD2}.hl-who .ml{background:#C62828}
.hl-what{background:#F8BBD0}.hl-what .ml{background:#AD1457}
.hl-where{background:#E1BEE7}.hl-where .ml{background:#6A1B9A}
.hl-when{background:#C5CAE9}.hl-when .ml{background:#283593}
.hl-why{background:#B2DFDB}.hl-why .ml{background:#00695C}
.hl-descriptive{background:transparent;border-bottom:3px wavy #4E342E;padding-bottom:1px}.hl-descriptive .ml{background:#4E342E}
.hl-wrong{background:#FFCDD2}.hl-wrong .ml{background:#D32F2F}

.sel-toolbar{position:fixed;z-index:100;background:#fff;border:2px solid #ddd;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.15);padding:10px 12px;display:none;width:260px}
.sel-toolbar.show{display:block}
.sel-toolbar-title{font-size:11px;font-weight:700;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.tb-err{font-size:11px;color:#D32F2F;font-weight:600;margin-top:4px}

.score-bar{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px;background:#fff;border-radius:12px;margin-bottom:16px;border:2px solid #e0e0e0}
.complete-msg{text-align:center;padding:20px;border-radius:12px;border:2px solid #2E7D32;background:#E8F5E9;margin-top:16px}
.code-area{background:#fff;border:2px solid #1565C0;border-radius:12px;padding:20px;margin-top:16px;text-align:center}
.code-display{font-family:monospace;font-size:11px;font-weight:700;letter-spacing:1px;background:#E3F2FD;padding:10px 16px;border-radius:8px;display:block;margin:10px 0;user-select:all;color:#1565C0;word-break:break-all;line-height:1.6;text-align:left}
.reset-btn{padding:10px 24px;border-radius:10px;border:2px solid #ddd;background:#fff;color:#555;font-weight:700;font-size:14px}
.reset-btn:hover{background:#f5f5f5}
.tv-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.tv-box{background:#fff;border-radius:16px;padding:24px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
</style>
</head>
<body>

<div class="top-bar">
  <h1>Anatomy of a News Article</h1>
  <p>Select &amp; Label the Parts</p>
</div>

<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('teacher')" id="btn-t">Teacher Model</button>
  <button class="mode-btn" onclick="setMode('student')" id="btn-s">Student Practice</button>
  <button class="mode-btn" onclick="showTV()" style="margin-left:8px;border-color:#E65100;color:#E65100;font-size:12px">View Code</button>
</div>

<div class="container" id="app"></div>
<div class="sel-toolbar" id="toolbar"></div>

<script>
var LABELS=[
  {id:"headline",label:"Headline",color:"#D32F2F",cls:"hl-headline"},
  {id:"byline",label:"Byline",color:"#7B1FA2",cls:"hl-byline"},
  {id:"lead",label:"The Lead",color:"#1565C0",cls:"hl-lead"},
  {id:"detail1",label:"Detail 1",color:"#2E7D32",cls:"hl-detail1"},
  {id:"detail2",label:"Detail 2",color:"#388E3C",cls:"hl-detail2"},
  {id:"detail3",label:"Detail 3",color:"#43A047",cls:"hl-detail3"},
  {id:"quotation",label:"Quotation",color:"#F57F17",cls:"hl-quotation"},
  {id:"tail",label:"The Tail",color:"#E65100",cls:"hl-tail"},
  {id:"who",label:"Who",color:"#C62828",cls:"hl-who"},
  {id:"what",label:"What",color:"#AD1457",cls:"hl-what"},
  {id:"where",label:"Where",color:"#6A1B9A",cls:"hl-where"},
  {id:"when",label:"When",color:"#283593",cls:"hl-when"},
  {id:"why",label:"Why / How",color:"#00695C",cls:"hl-why"},
  {id:"descriptive",label:"Strong Language",color:"#4E342E",cls:"hl-descriptive"},
];

var FIVEW_IDS=["who","what","where","when","why"];

// Raw article text — each is a full string, rendered as plain HTML
var TEACHER_RAW='<div class="a-headline">Grade 6 Students Win City-Wide Pizza Taste Test Challenge</div><div class="a-byline">By <strong>Jordan Mitchell</strong></div><div class="a-byline"><strong>TORONTO</strong> \u2014</div><div class="a-para">Students at Riverside Public School made history on Friday when their team took first place in the annual Toronto Pizza Taste Test Challenge. The Grade 6 team, known as \u201cThe Crust Crew,\u201d beat out 24 other schools by creating an original pizza recipe using only local ingredients from Ontario farms.</div><div class="a-para">The competition, held at the Metro Toronto Convention Centre, challenged teams of four students to design, prepare, and present a pizza in under 90 minutes.</div><div class="a-para">The Crust Crew impressed judges with their \u201cMaple Harvest\u201d pizza, which featured roasted butternut squash, caramelized onions, aged cheddar from a Stratford dairy farm, and a drizzle of local maple syrup.</div><div class="a-para">\u201cWe practised every weekend for two months,\u201d explained team captain Priya Sharma, a Grade 6 student at Riverside. \u201cThe hardest part was getting the dough right \u2014 we burned it so many times before we figured out the perfect temperature.\u201d</div><div class="a-para">Head judge Chef Alana Moreau said the winning entry stood out because of its creativity and use of seasonal ingredients. Over 300 students from across the Greater Toronto Area participated in this year\u2019s event, which was organized by the Toronto District School Board in partnership with local restaurants.</div><div class="a-para">The Crust Crew will now represent Toronto at the provincial competition in Ottawa this June. Riverside\u2019s principal, Ms. Dhillon, said the school plans to host a celebration assembly next week. For now, the team says they are focused on perfecting one thing: their dough.</div>';

var STUDENT_RAW='<div class="a-headline">Stray Dog Adopted by Fire Station After Daring Highway Rescue</div><div class="a-byline">By <strong>Amara Johnson</strong></div><div class="a-byline"><strong>HAMILTON</strong> \u2014</div><div class="a-para">A stray dog that was rescued from the middle of Highway 403 on Wednesday morning has found a permanent home at Hamilton Fire Station 7. The young German Shepherd mix, now named Blaze, was spotted dodging traffic near the Lincoln Alexander Parkway exit just after 7 a.m.</div><div class="a-para">Firefighter Marcus Rivera was on his way to work when he noticed cars swerving to avoid the frightened animal. He pulled over, blocked a lane with his truck, and carefully approached the dog with a granola bar from his lunch bag. It took nearly 15 minutes to earn the dog\u2019s trust before Rivera could safely carry him to his vehicle.</div><div class="a-para">\u201cHe was shaking so badly I could feel it through my jacket,\u201d said Rivera, who has been a firefighter for 12 years. \u201cBut the moment I picked him up, he just buried his head in my arms and stopped moving. I think he knew he was safe.\u201d</div><div class="a-para">After a visit to a local veterinarian, Blaze was found to be about two years old, healthy, and not microchipped. The crew at Station 7 voted unanimously to adopt him as their official station dog.</div><div class="a-para">The Hamilton SPCA confirmed that no owner had come forward to claim the animal after a 72-hour waiting period. The fire department said Blaze passed all required health checks and is now fully vaccinated.</div><div class="a-para">Blaze has already become a favourite at the station, where he sleeps beside the fire trucks and greets visitors at the door. The fire department plans to train him as a therapy dog for community events. Rivera, who now keeps extra granola bars in his truck, says he wouldn\u2019t change a thing about that morning.</div>';

var pendingText=null;
var toolbar=document.getElementById("toolbar");

function setMode(m){mode=m;highlights=[];pendingText=null;toolbar.classList.remove("show");

document.getElementById("btn-s").className="mode-btn"+(m==="student"?" s-active":"");

function leadLabelled(){return !!used()["lead"]}

// DOM-based highlighting — wraps text nodes without extracting content
function applyHighlightsDOM(root,hls,isTeacher){
  if(!hls.length)return;
  hls.forEach(function(hl){
    var info=LABELS.find(function(l){return l.id===hl.id});
    if(!info)return;
    var labelText=isTeacher?info.label:hl.typed;

    // Collect all text nodes fresh
    var textNodes=[];
    var w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null,false);
    while(w.nextNode())textNodes.push(w.currentNode);

    // Find which text nodes overlap with [hl.start, hl.end)
    var charCount=0;
    var nodesToWrap=[];
    for(var i=0;i<textNodes.length;i++){
      var node=textNodes[i];
      var nodeStart=charCount;
      var nodeEnd=charCount+node.textContent.length;

      if(nodeEnd>hl.start&&nodeStart<hl.end){
        // This node overlaps
        var wrapStart=Math.max(0,hl.start-nodeStart);
        var wrapEnd=Math.min(node.textContent.length,hl.end-nodeStart);
        nodesToWrap.push({node:node,wrapStart:wrapStart,wrapEnd:wrapEnd});
      }
      charCount=nodeEnd;
    }

    // Wrap each overlapping text node (or portion of it)
    var isFirst=true;
    nodesToWrap.forEach(function(nw){
      var txt=nw.node.textContent;
      var before=txt.substring(0,nw.wrapStart);
      var match=txt.substring(nw.wrapStart,nw.wrapEnd);
      var after=txt.substring(nw.wrapEnd);
      if(!match)return;

      var mark=document.createElement("mark");
      mark.className=info.cls;
      if(isFirst){
        var ml=document.createElement("span");
        ml.className="ml";ml.textContent=labelText;
        mark.appendChild(ml);
        isFirst=false;
      }
      mark.appendChild(document.createTextNode(match));

      var parent=nw.node.parentNode;
      if(before)parent.insertBefore(document.createTextNode(before),nw.node);
      parent.insertBefore(mark,nw.node);
      if(after)parent.insertBefore(document.createTextNode(after),nw.node);
      parent.removeChild(nw.node);
    });
  });
}

function checkSel(){
  var sel=window.getSelection();
  if(!sel||sel.isCollapsed||!sel.toString().trim()){toolbar.classList.remove("show");return}
  var text=sel.toString();
  if(text.trim().length<2)return;

  var ab=document.getElementById("article-body");
  if(!ab||!ab.contains(range.commonAncestorContainer))return;
  // Also check startContainer is inside article
  if(!ab.contains(range.startContainer))return;

  // Get the plain text of the entire article
  var fullPlain=getPlainText(ab);
  // Find where the selected text appears in the plain text
  // Use the selection's anchor to disambiguate duplicates
  var selText=text;
  // Walk the DOM to find the character offset of the range start
  var startOff=getTextOffset(ab,range.startContainer,range.startOffset);
  var endOff=startOff+selText.length;

  pendingText=selText;
  pendingStart=startOff;
  pendingEnd=endOff;

  var rect=range.getBoundingClientRect();

  slBtn.textContent="Strong";

var pendingStart=0;
var pendingEnd=0;

// Get plain text from an element, matching how the browser renders it
function getPlainText(el){
  var text="";
  var walker=document.createTreeWalker(el,NodeFilter.SHOW_TEXT,null,false);
  while(walker.nextNode()){text+=walker.currentNode.textContent}
  return text;
}

// Get the character offset of a specific point (container+offset) within a root element
function getTextOffset(root,container,offset){
  var count=0;
  var walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null,false);
  while(walker.nextNode()){
    var node=walker.currentNode;
    if(node===container){return count+offset}
    count+=node.textContent.length;
  }
  // If container is an element node, count text nodes up to the offset-th child
  if(container.nodeType===1){
    var count2=0;
    var walker2=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null,false);
    var childNodes=container.childNodes;
    var targetChild=childNodes[Math.min(offset,childNodes.length-1)];
    while(walker2.nextNode()){
      var node2=walker2.currentNode;
      if(node2===targetChild||container.contains(node2)&&Array.prototype.indexOf.call(childNodes,node2.parentNode)>=offset){return count2}
      count2+=node2.textContent.length;
    }
    return count2;
  }
  return count;
}

function tryLabel(value){
  var v=value.trim().toLowerCase();if(!v||!pendingText)return;
  var u=used();var matchedId=null;
  for(var id in ACCEPT){
    // Allow unlimited "descriptive" labels
    if(u[id]&&id!=="descriptive")continue;
    if(ACCEPT[id].indexOf(v)!==-1){matchedId=id;break}
  }
  if(matchedId){
    highlights.push({id:matchedId,text:pendingText,start:pendingStart,end:pendingEnd,typed:value.trim()});
    pendingText=null;toolbar.classList.remove("show");
    window.getSelection().removeAllRanges();render();
  }else{
    var anyMatch=false;
    for(var id2 in ACCEPT){
      if(ACCEPT[id2].indexOf(v)!==-1){anyMatch=true;break}
    }
    var err=toolbar.querySelector(".tb-err");
    if(!err){err=document.createElement("div");err.className="tb-err";toolbar.appendChild(err)}
    if(anyMatch){
      err.textContent="That label has already been used. Try a different one.";
    }else{
      err.textContent="Not recognized \u2014 check the word bank and try again.";
    }
  }
}

// Code generation — compact binary encoding
// 3 bytes per highlight: id(4bits) + start(10bits) + length(8bits)
function genCode(){
  if(!highlights.length)return"";
  var bytes=[];
  highlights.forEach(function(hl){
    var idx=LABELS.findIndex(function(l){return l.id===hl.id});
    if(idx<0)return;
    var start=hl.start;
    var len=Math.min(hl.end-hl.start,255);
    bytes.push((idx<<4)|((start>>6)&0xF));
    bytes.push(((start&0x3F)<<2)|((len>>6)&0x3));
    bytes.push((len&0x3F)<<2);
  });
  // Convert to base64
  var str="";for(var i=0;i<bytes.length;i++)str+=String.fromCharCode(bytes[i]);
  return btoa(str).replace(/=+$/,"");
}

// Decode compact code
function decodeCode(code){
  try{
    // Add back base64 padding
    while(code.length%4!==0)code+="=";
    var str=atob(code);
    var hls=[];
    for(var i=0;i+2<str.length;i+=3){
      var b0=str.charCodeAt(i);
      var b1=str.charCodeAt(i+1);
      var b2=str.charCodeAt(i+2);
      var idx=(b0>>4)&0xF;
      var start=((b0&0xF)<<6)|((b1>>2)&0x3F);
      var len=((b1&0x3)<<6)|((b2>>2)&0x3F);
      if(idx<LABELS.length){
        hls.push({id:LABELS[idx].id,start:start,end:start+len,typed:LABELS[idx].label});
      }
    }
    return hls;
  }catch(e){return null}
}
